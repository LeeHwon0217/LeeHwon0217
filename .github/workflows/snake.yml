name: generate animation
permissions:
  contents: write
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Snake SVG (light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: LeeHwon0217
          outputs: dist/github-contribution-grid-snake.svg
        env:
          SNAKE_COLOR: "#58A6FF"
          BACKGROUND_COLOR: "#0D1117"
          DOT_COLOR_EMPTY: "#0D1117"
          DOT_COLOR_1: "#0d2a45"
          DOT_COLOR_2: "#1a3a5c"
          DOT_COLOR_3: "#1f6feb"
          DOT_COLOR_4: "#58A6FF"

      - name: Generate Snake SVG (dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: LeeHwon0217
          outputs: dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          SNAKE_COLOR: "#58A6FF"
          BACKGROUND_COLOR: "#0D1117"
          DOT_COLOR_EMPTY: "#0D1117"
          DOT_COLOR_1: "#0d2a45"
          DOT_COLOR_2: "#1a3a5c"
          DOT_COLOR_3: "#1f6feb"
          DOT_COLOR_4: "#58A6FF"

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
