name: generate animation
permissions:
  contents: write
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: LeeHwon0217
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#58A6FF&color_dots[0]=#0D1117&color_dots[2]=#1a3a5c&color_dots[3]=#1f6feb&color_dots[4]=#58A6FF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#58A6FF&color_dots[0]=#0D1117&color_dots[2]=#1a3a5c&color_dots[3]=#1f6feb&color_dots[4]=#58A6FF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
